name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  formatting:
    runs-on: ubuntu-latest
    name: "Check linting and formatting"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11"
          python-version: "3.14"

      - name: Run ruff via nox
        run: |
          uv run nox -s format

  pyright:
    runs-on: ubuntu-latest
    name: "Check types"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11"
          python-version: "3.14"

      - name: Run pyright via nox
        run: |
          uv run nox -s pyright
